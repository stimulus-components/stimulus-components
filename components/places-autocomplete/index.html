<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Stimulus Places Autocomplete</title>

    <script src="https://maps.googleapis.com/maps/api/js?key=change-me&loading=async"></script>

    <script type="module">
      import "../app.css"
      import { Application } from "@hotwired/stimulus"
      import PlacesAutocomplete from "./src/index"

      const application = Application.start()
      application.register("places", PlacesAutocomplete)
    </script>
  </head>

  <body>
    <div data-controller="places">
      <input type="text" data-places-target="address" />
    </div>
  </body>
</html>
